<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Fit Finder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 380px;
    max-height: 560px;
    overflow-y: auto;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f0f13;
    color: #e2e2e8;
    font-size: 0.85rem;
  }
  header {
    background: #1a1a24;
    border-bottom: 1px solid #2a2a38;
    padding: 12px 16px;
  }
  header h1 { font-size: 1rem; font-weight: 600; color: #fff; }
  header .company { font-size: 0.78rem; color: #a89fff; margin-top: 2px; }

  #not-supported, #status, #empty {
    padding: 24px 16px;
    color: #888;
    line-height: 1.5;
    font-size: 0.82rem;
  }
  #status.error {
    color: #f87171;
  }

  #form { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
  #form label { font-size: 0.72rem; color: #888; }
  #form input, #form textarea {
    background: #1a1a24;
    border: 1px solid #2a2a38;
    color: #e2e2e8;
    padding: 7px 10px;
    border-radius: 8px;
    font-size: 0.82rem;
    outline: none;
    font-family: inherit;
    width: 100%;
  }
  #form input:focus, #form textarea:focus { border-color: #6c63ff; }
  #form textarea { resize: vertical; min-height: 70px; line-height: 1.4; }
  #analyze-btn {
    background: #6c63ff;
    color: #fff;
    border: none;
    font-size: 0.82rem;
    padding: 9px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    margin-top: 4px;
  }
  #analyze-btn:hover { background: #5b53e6; }
  #analyze-btn:disabled { opacity: 0.6; cursor: default; }

  #results { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }
  #results-count { padding: 0 16px 8px; font-size: 0.75rem; color: #666; }
  .card { background: #1a1a24; border: 1px solid #2a2a38; border-radius: 10px; padding: 12px; }
  .card-header { position: relative; padding-right: 60px; margin-bottom: 6px; }
  .score { position: absolute; top: 0; right: 0; font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
  .score-hi { background: #0f2f1f; color: #4ade80; border: 1px solid #166534; }
  .score-mid { background: #1e1a0f; color: #fbbf24; border: 1px solid #78350f; }
  .score-lo { background: #2a1414; color: #f87171; border: 1px solid #7f1d1d; }
  .title { color: #a89fff; font-weight: 600; font-size: 0.85rem; text-decoration: none; line-height: 1.3; display: block; }
  .title:hover { color: #d4cfff; }
  .meta { font-size: 0.72rem; color: #aaa; margin-bottom: 6px; }
  .why { font-size: 0.75rem; color: #888; line-height: 1.4; }
  .why.scoring-error { color: #666; font-style: italic; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<header>
  <h1>Job Fit Finder</h1>
  <div class="company" id="company-label"></div>
</header>

<div id="not-supported" class="hidden">Open a company's job board to analyze it — Ashby (jobs.ashbyhq.com/&lt;company&gt;) or Greenhouse (job-boards.greenhouse.io/&lt;company&gt; or boards.greenhouse.io/&lt;company&gt;).</div>

<div id="form" class="hidden">
  <label for="titles">Target job titles</label>
  <input type="text" id="titles" placeholder="e.g. Software Engineer, Full-Stack Engineer">
  <label for="ideal-role">Ideal role, responsibilities &amp; must-haves</label>
  <textarea id="ideal-role" placeholder="Describe your ideal role, responsibilities, and must-haves…"></textarea>
  <button id="analyze-btn">🔍 Analyze</button>
</div>

<div id="status" class="hidden"></div>
<div id="empty" class="hidden"></div>
<div id="results-count" class="hidden"></div>
<div id="results"></div>

<script src="popup.js"></script>
</body>
</html>
